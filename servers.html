<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Jiro — Select Server</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#09090f;--s1:#0f1018;--s2:#15161f;--s3:#1c1d28;--s4:#22243200;
  --bo:rgba(255,255,255,.06);--bom:rgba(255,255,255,.11);--boh:rgba(88,101,242,.5);
  --ac:#5865F2;--acg:rgba(88,101,242,.28);--acs:rgba(88,101,242,.14);
  --t1:#eeeef5;--t2:#9498b3;--t3:#555878;--t4:#2f3148;
  --gr:#23a55a;--grs:rgba(35,165,90,.15);
  --rd:#f23f43;--rds:rgba(242,63,67,.15);
  --fn:'Outfit',sans-serif;--mo:'JetBrains Mono',monospace;
  --r:12px;--rs:8px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;background:var(--bg);color:var(--t1);font-family:var(--fn);-webkit-font-smoothing:antialiased}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.02;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:140px}
.mesh{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.orb{position:absolute;border-radius:50%;filter:blur(90px)}
.o1{width:650px;height:650px;top:-200px;right:-120px;background:radial-gradient(circle,rgba(88,101,242,.18),transparent 68%);animation:o1 13s ease-in-out infinite alternate}
.o2{width:500px;height:500px;bottom:-160px;left:-80px;background:radial-gradient(circle,rgba(35,165,90,.14),transparent 68%);animation:o2 16s ease-in-out infinite alternate}
@keyframes o1{from{transform:translate(0,0)}to{transform:translate(60px,50px)}}
@keyframes o2{from{transform:translate(0,0)}to{transform:translate(-50px,60px)}}

/* TOPBAR */
header{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:18px 40px;border-bottom:1px solid var(--bo);background:rgba(9,9,15,.8);backdrop-filter:blur(12px)}
.logo{display:flex;align-items:center;gap:11px;text-decoration:none}
.logo-mark{width:36px;height:36px;background:var(--ac);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#fff;box-shadow:0 0 18px var(--acg);flex-shrink:0}
.logo-name{font-size:18px;font-weight:800;color:var(--t1)}
.user-chip{display:flex;align-items:center;gap:10px;background:var(--s2);border:1px solid var(--bom);border-radius:40px;padding:6px 14px 6px 6px;cursor:default}
.user-av{width:32px;height:32px;border-radius:50%;object-fit:cover;background:var(--ac);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.user-av img{width:100%;height:100%;border-radius:50%;object-fit:cover}
.user-name{font-size:13px;font-weight:600;color:var(--t2)}
.logout{background:none;border:1px solid var(--bo);border-radius:var(--rs);color:var(--t3);font-family:var(--fn);font-size:12px;font-weight:500;padding:6px 12px;cursor:pointer;transition:.15s;margin-left:6px}
.logout:hover{border-color:var(--rd);color:var(--rd)}

/* PAGE */
.page{position:relative;z-index:2;max-width:960px;margin:0 auto;padding:52px 24px 80px}
.page-title{font-size:28px;font-weight:800;color:var(--t1);letter-spacing:-.5px;margin-bottom:6px}
.page-sub{font-size:14px;color:var(--t3);margin-bottom:32px;line-height:1.6}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:28px}
.search-wrap input{width:100%;background:var(--s1);border:1px solid var(--bom);border-radius:var(--r);color:var(--t1);font-family:var(--fn);font-size:15px;padding:14px 18px 14px 50px;outline:none;transition:border-color .15s}
.search-wrap input::placeholder{color:var(--t4)}
.search-wrap input:focus{border-color:var(--boh)}
.search-ico{position:absolute;left:17px;top:50%;transform:translateY(-50%);color:var(--t4);font-size:18px;pointer-events:none}

/* GUILD GRID */
.section-label{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--t4);margin-bottom:14px}
.guild-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-bottom:40px}

.guild-card{position:relative;background:var(--s1);border:1px solid var(--bo);border-radius:var(--r);padding:24px 20px;cursor:pointer;transition:.2s ease;display:flex;flex-direction:column;align-items:center;gap:14px;text-align:center;text-decoration:none}
.guild-card:hover{background:var(--s2);border-color:var(--boh);transform:translateY(-3px);box-shadow:0 12px 36px rgba(0,0,0,.4)}
.guild-card.invite{border-style:dashed;cursor:default;opacity:.7}
.guild-card.invite:hover{transform:none;box-shadow:none}

.guild-icon{width:64px;height:64px;border-radius:16px;object-fit:cover;background:var(--ac);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;color:#fff;flex-shrink:0;overflow:hidden}
.guild-icon img{width:100%;height:100%;border-radius:16px;object-fit:cover}
.guild-icon.animated img{border-radius:16px}
.guild-name{font-size:14px;font-weight:700;color:var(--t1);line-height:1.3;word-break:break-word}
.guild-id{font-size:10px;color:var(--t4);font-family:var(--mo);margin-top:2px}

.guild-tag{position:absolute;top:12px;right:12px;font-size:10px;font-weight:700;padding:3px 7px;border-radius:5px}
.tag-owner{background:rgba(250,168,26,.15);color:#f0a232}

/* invite CTA inside card */
.invite-inner{display:flex;flex-direction:column;align-items:center;gap:12px}
.invite-icon{font-size:32px;opacity:.5}
.invite-text{font-size:13px;color:var(--t3);line-height:1.5}
.invite-btn{padding:8px 18px;background:var(--ac);color:#fff;font-family:var(--fn);font-size:13px;font-weight:600;border:none;border-radius:8px;cursor:pointer;transition:.15s}
.invite-btn:hover{background:#4752c4}

/* EMPTY */
.empty{text-align:center;padding:64px 20px;color:var(--t4)}
.empty-icon{font-size:44px;margin-bottom:16px;opacity:.4}
.empty-msg{font-size:14px;line-height:1.7}

/* LOADING SKELETONS */
.skel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
.skel-card{background:var(--s1);border:1px solid var(--bo);border-radius:var(--r);padding:24px 20px;display:flex;flex-direction:column;align-items:center;gap:14px}
.skel-circle{width:64px;height:64px;border-radius:16px;background:linear-gradient(90deg,var(--s2) 25%,var(--s3) 50%,var(--s2) 75%);background-size:200% 100%;animation:sh 1.4s infinite}
.skel-line{height:12px;border-radius:4px;background:linear-gradient(90deg,var(--s2) 25%,var(--s3) 50%,var(--s2) 75%);background-size:200% 100%;animation:sh 1.4s infinite}
@keyframes sh{from{background-position:200% 0}to{background-position:-200% 0}}

@media(max-width:600px){header{padding:14px 18px}.page{padding:32px 16px 60px}.guild-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="mesh"><div class="orb o1"></div><div class="orb o2"></div></div>

<header>
  <a class="logo" href="index.html">
    <div class="logo-mark">J</div>
    <span class="logo-name">Jiro</span>
  </a>
  <div style="display:flex;align-items:center;gap:10px">
    <div class="user-chip">
      <div class="user-av" id="user-av"></div>
      <span class="user-name" id="user-name">Loading…</span>
    </div>
    <button class="logout" onclick="logout()">Logout</button>
  </div>
</header>

<div class="page">
  <div class="page-title">Select a Server</div>
  <div class="page-sub">Choose a server to manage. Only servers where Jiro is invited will appear below.</div>

  <div class="search-wrap">
    <span class="search-ico">🔍</span>
    <input type="text" id="search" placeholder="Search servers…" oninput="filterGuilds(this.value)"/>
  </div>

  <div class="section-label" id="section-label">Your Servers</div>
  <div class="guild-grid" id="guild-grid">
    <!-- skeleton -->
    <div class="skel-grid" id="skeleton" style="display:contents">
      <div class="skel-card"><div class="skel-circle"></div><div class="skel-line" style="width:70%"></div><div class="skel-line" style="width:45%"></div></div>
      <div class="skel-card"><div class="skel-circle"></div><div class="skel-line" style="width:60%"></div><div class="skel-line" style="width:40%"></div></div>
      <div class="skel-card"><div class="skel-circle"></div><div class="skel-line" style="width:75%"></div><div class="skel-line" style="width:50%"></div></div>
      <div class="skel-card"><div class="skel-circle"></div><div class="skel-line" style="width:55%"></div><div class="skel-line" style="width:35%"></div></div>
    </div>
  </div>
</div>

<script>
// ── CONFIG ─────────────────────────────────────────────────────
const INVITE_URL = "https://discord.com/api/oauth2/authorize?client_id=YOUR_CLIENT_ID&permissions=8&scope=bot%20applications.commands";

let allGuilds = [];

function init() {
  const raw = sessionStorage.getItem("jiro_session");
  if (!raw) { window.location.href = "index.html"; return; }

  let session;
  try { session = JSON.parse(raw); } catch(e) { logout(); return; }

  // Check token not expired
  if (Date.now() > session.expires_at) { logout(); return; }

  const { user, guilds } = session;

  // Populate user chip
  const av = document.getElementById("user-av");
  if (user.avatar) {
    av.innerHTML = `<img src="${user.avatar}" alt="${user.username}" onerror="this.parentElement.textContent='${user.username[0].toUpperCase()}'"/>`;
  } else {
    av.textContent = user.username[0].toUpperCase();
  }
  document.getElementById("user-name").textContent = user.global_name || user.username;

  allGuilds = guilds;
  renderGuilds(guilds);
}

function renderGuilds(guilds) {
  const grid  = document.getElementById("guild-grid");
  const label = document.getElementById("section-label");

  // Clear skeletons
  grid.innerHTML = "";

  if (!guilds.length) {
    label.textContent = "No Servers Found";
    grid.innerHTML = `
      <div class="empty" style="grid-column:1/-1">
        <div class="empty-icon">🤖</div>
        <div class="empty-msg">
          Jiro isn't in any of your servers yet,<br>or you don't manage any servers with Jiro.
          <br><br>
          <button class="invite-btn" onclick="window.open('${INVITE_URL}','_blank')">
            Invite Jiro to a Server
          </button>
        </div>
      </div>`;
    return;
  }

  label.textContent = `Your Servers (${guilds.length})`;

  guilds.forEach(g => {
    const card = document.createElement("div");
    card.className = "guild-card";
    card.onclick = () => selectGuild(g);

    const iconHtml = g.icon
      ? `<div class="guild-icon"><img src="${g.icon}" alt="${g.name}" loading="lazy"/></div>`
      : `<div class="guild-icon">${g.name[0].toUpperCase()}</div>`;

    card.innerHTML = `
      ${g.owner ? '<span class="guild-tag tag-owner">♔ Owner</span>' : ''}
      ${iconHtml}
      <div>
        <div class="guild-name">${esc(g.name)}</div>
        <div class="guild-id">${g.id}</div>
      </div>`;

    grid.appendChild(card);
  });

  // Add "invite to another server" card at end
  const invCard = document.createElement("div");
  invCard.className = "guild-card invite";
  invCard.innerHTML = `
    <div class="invite-inner">
      <div class="invite-icon">➕</div>
      <div class="invite-text">Invite Jiro to another server</div>
      <button class="invite-btn" onclick="event.stopPropagation();window.open('${INVITE_URL}','_blank')">Invite</button>
    </div>`;
  grid.appendChild(invCard);
}

function filterGuilds(q) {
  q = q.toLowerCase().trim();
  renderGuilds(q ? allGuilds.filter(g => g.name.toLowerCase().includes(q) || g.id.includes(q)) : allGuilds);
}

function selectGuild(guild) {
  // Store selected guild and navigate to main dashboard
  const raw = sessionStorage.getItem("jiro_session");
  const session = JSON.parse(raw);
  session.guild = guild;
  sessionStorage.setItem("jiro_session", JSON.stringify(session));
  window.location.href = `app.html?guild=${guild.id}`;
}

function logout() {
  sessionStorage.removeItem("jiro_session");
  window.location.href = "index.html";
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

init();
</script>
</body>
</html>
