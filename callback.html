<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Jiro — Signing In…</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{--ac:#5865F2;--acg:rgba(88,101,242,.3);--bg:#09090f;--t1:#eeeef5;--t3:#555878;--rd:#f23f43}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--t1);font-family:'Outfit',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:0;-webkit-font-smoothing:antialiased}
body::after{content:'';position:fixed;inset:0;pointer-events:none;opacity:.02;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:140px}
.orb{position:fixed;border-radius:50%;filter:blur(90px);pointer-events:none}
.o1{width:600px;height:600px;top:-200px;right:-100px;background:radial-gradient(circle,rgba(88,101,242,.2),transparent 68%)}
.o2{width:500px;height:500px;bottom:-150px;left:-80px;background:radial-gradient(circle,rgba(35,165,90,.14),transparent 68%)}
.card{position:relative;z-index:2;background:#0f1018;border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:52px 48px;width:420px;max-width:92vw;text-align:center;box-shadow:0 8px 48px rgba(0,0,0,.6);animation:ci .4s cubic-bezier(.34,1.56,.64,1) both}
@keyframes ci{from{opacity:0;transform:translateY(16px) scale(.97)}to{opacity:1;transform:none}}
.logo{width:64px;height:64px;background:var(--ac);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-size:28px;font-weight:800;color:#fff;box-shadow:0 0 32px var(--acg)}
.state-loading .status-icon{display:block}.state-error .status-icon{display:none}
.status-icon{margin:0 auto 20px;width:48px;height:48px}
/* spinner */
.spinner{width:48px;height:48px;border:3px solid rgba(88,101,242,.2);border-top-color:var(--ac);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 20px}
@keyframes spin{to{transform:rotate(360deg)}}
h2{font-size:20px;font-weight:700;color:var(--t1);margin-bottom:8px}
p{font-size:14px;color:var(--t3);line-height:1.65}
.err-icon{font-size:44px;margin-bottom:16px}
.retry-btn{margin-top:24px;padding:11px 24px;background:var(--ac);color:#fff;font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;border:none;border-radius:8px;cursor:pointer;transition:.15s}
.retry-btn:hover{background:#4752c4}
.step{font-size:12px;color:rgba(88,101,242,.7);margin-top:12px;font-family:'Outfit',sans-serif}
</style>
</head>
<body>
<div class="orb o1"></div><div class="orb o2"></div>
<div class="card" id="card">
  <div class="logo">J</div>
  <div class="spinner" id="spinner"></div>
  <h2 id="title">Signing you in…</h2>
  <p id="desc">Verifying your Discord account and fetching your servers.</p>
  <p class="step" id="step"></p>
</div>

<script>
// ── CONFIG (must match index.html) ─────────────────────────────
const CONFIG = {
  SUPABASE_FUNCTION_URL: "https://hfxagwcwaalrmaqzhyfj.supabase.co/functions/v1/discord-oauth",
  REDIRECT_URI:          "https://suprosmith-coder.github.io/jiro-dashboard/callback.html",
};

async function handleCallback() {
  const params = new URLSearchParams(window.location.search);
  const code  = params.get("code");
  const error = params.get("error");

  if (error) {
    showError("Discord login cancelled", "You cancelled the Discord login. Click below to try again.");
    return;
  }

  if (!code) {
    showError("No authorization code", "Something went wrong with the OAuth flow. Please try again.");
    return;
  }

  try {
    setStep("Exchanging authorization code…");

    // Call Supabase Edge Function to exchange code
    const res = await fetch(CONFIG.SUPABASE_FUNCTION_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ code, redirect_uri: CONFIG.REDIRECT_URI }),
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || "Token exchange failed");
    }

    const data = await res.json();
    setStep("Fetching your servers…");

    // Store session in sessionStorage (tab-only, clears on close)
    // Use localStorage if you want persistence across tabs
    sessionStorage.setItem("jiro_session", JSON.stringify({
      user:         data.user,
      guilds:       data.guilds,
      access_token: data.access_token,
      expires_at:   Date.now() + (data.expires_in * 1000),
    }));

    // Clean URL (remove ?code= from history)
    window.history.replaceState({}, document.title, window.location.pathname);

    setStep("Redirecting…");
    setTimeout(() => { window.location.href = "servers.html"; }, 400);

  } catch(e) {
    console.error(e);
    showError("Authentication failed", e.message || "An unexpected error occurred. Please try again.");
  }
}

function setStep(msg) {
  document.getElementById("step").textContent = msg;
}

function showError(title, desc) {
  document.getElementById("spinner").style.display = "none";
  document.getElementById("step").style.display    = "none";
  const card = document.getElementById("card");
  card.innerHTML = `
    <div class="logo">J</div>
    <div class="err-icon">⚠️</div>
    <h2 style="color:#f23f43">${title}</h2>
    <p style="margin-top:8px">${desc}</p>
    <button class="retry-btn" onclick="window.location.href='index.html'">Back to Login</button>
  `;
}

handleCallback();
</script>
</body>
</html>
